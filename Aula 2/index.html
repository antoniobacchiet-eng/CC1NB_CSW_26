<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon-32x32.png" type="image/x-icon">
    <title>Aula Imagens</title>

</head>
<body>
    <h1>Desafio das imagens</h1>
    <h2>Serra</h2>
    <img src="serra.jpg" width="70%" alt="Foto aerea de Serra-ES">
    <hr>
    <h2>Outra foto da minha cidade Serra-Es agora com legenda</h2>
    <figure>
        <img src="serra_2.png" width="200px" height="200px" alt="Foto aerea de um condominio em Serra-ES">
        <figcaption>Legenda para a foto da praia em Serra-Es</figcaption>
    </figure>
    <hr>
    <h2>Outra foto de minha cidade Serra-Es, agora com alteração de tamanho</h2>
    <picture>
        <source media ="(max-width: 1000px)" srcset="serra_3.png" sizes="300px">
        <img src="serra_4.jpg" alt="Foto igreja em serra-Es" width="40%" height="200px">

    </picture>
</body>
</html>
