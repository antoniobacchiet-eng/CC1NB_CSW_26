<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 9</title>
</head>
<body>
    <h1>Formulario</h1>
    <table border="1">
        <form action="mailto:seu.email@seuemail.com" method="post">
            <tbody>
                <tr>
                    <td><label for="nome-usuario">Nome:</label></td>
                    <td>
                        <input type="text" name="nome-usuario" id="nome-usuario" size="40" maxlength="50" value="" placeholder="Digite seu nome">
                    </td>
                </tr>
                <tr>
                    <td><label for="email">Email pessoal:</label></td>
                    <td>
                        <input type="email" id="email" name="email">
                    </td>
                </tr>
                <tr>
                    <td><label for="email-p">Email (patter):</label></td>
                    <td>
                        <input type="email-p" id="email-p" name="email-p" placeholder="Digite seu email com @">
                    </td>
                </tr>
                <tr>
                    <td><label for="senha">Senha:</label></td>
                    <td>
                        <input type="text" name="senha" id="senha">
                    </td>
                </tr>
                <tr>
                    <td><label for="idade">Idade:</label></td>
                    <td>
                        <input type="number" name="idade" id="idade">
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <p>Deixe um comentário</p>
                        <textarea name="comentário"cols="50" rows="10"></textarea>
                    </td>
                </tr>
                <tr>
                    <td>
                        <p>Materia de interesse</p>
                        <label for="materia"></label>
                        <input type="checkbox" name="materia" value="backend"> Backend <br>
                        <input type="checkbox" name="materia" id="materia" value="frontend"> Frontend <br>
                        <input type="checkbox" name="materia" id="materia" value="fullstack"> FullStack
                    </td>
                    <td>
                        <p>Tipo de Viagem:</p>
                        <label for="viagem"></label>
                        <input type="radio" name="viagem" id="viagem" value="negocios"> Negocios <br>
                        <input type="radio" name="viagem" id="viagem" value="lazer"> Lazer <br>
                        <input type="radio" name="viagem" id="viagem" value="turismo"> Turismo <br>
                        <input type="radio" name="viagem" id="viagem" value="academico"> Acadêmico
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="esporte">Esporte favorito:</label>
                        <select name="esporte" id="esporte" size="4">
                            <option value="futebol">Futebol</option>
                            <option value="basquete">Basquete</option>
                            <option value="volei">Vôlei</option>
                            <option value="tenis">Tênis</option>
                        </select>
                    </td>
                    <td>
                        <label for="investimento">Investimentos:</label>
                        <select name="investimento" id="investimento">
                            <option disabled>Baixo risco</option>
                            <option value="poupanca">Poupança</option>
                            <option value="cdb">CDB</option>
                            <option value="tesouro_direto">Tesouro Direto</option>
                            <option disabled>Risco moderado</option>
                            <option value="fundos_imobiliarios">Fundos Imobiliários</option>
                            <option value="cdi">CDI</option>
                            <option value="debentures">DEBÊNTURES</option>
                            <option disabled>Risco elevado</option>
                            <option value="criptomoedas">Criptomoedas</option>
                            <option value="acoes">Ações</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="cor">Escolha uma cor:</label>
                        <input type="color" name="cor" id="cor">
                    </td>
                    <td>
                        <label for="anexo">Selecione um arquivo:</label>
                        <input type="file" name="anexo" id="anexo">
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <label for="dataEnvio">Data e Hora envio</label>
                        <input type="datetime-local" name="dataEnvio" id="dataEnvio">
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="submit">
                    </td>
                    <td>
                        <input type="reset" value="Limpar">
                    </td>
                </tr>
            </tbody>
        </form>
    </table>
</body>
</html>
